name: Deploy to Hostinger

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Set production configs before build
      - name: Set production configs
        run: |
          cat > website/next.config.ts << 'EOF'
          import type { NextConfig } from "next";
          const nextConfig: NextConfig = { output: 'standalone' };
          export default nextConfig;
          EOF

          cat > admin/next.config.ts << 'EOF'
          import type { NextConfig } from "next";
          const nextConfig: NextConfig = {
            output: 'standalone',
            basePath: '/admin',
            typescript: { ignoreBuildErrors: true },
            eslint: { ignoreDuringBuilds: true },
          };
          export default nextConfig;
          EOF

      # Build website
      - name: Build website
        run: |
          cd website
          npm ci
          NEXT_PUBLIC_API_URL=https://fooddeliveryaudit.com/api npx next build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      # Build admin
      - name: Build admin
        run: |
          cd admin
          npm ci
          NEXT_PUBLIC_API_URL=https://fooddeliveryaudit.com/api npx next build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      # Build backend
      - name: Build backend
        run: |
          cd backend
          npm ci
          npx nest build

      # Prepare deployment package
      - name: Prepare package
        run: |
          mkdir -p deploy/website/.next
          mkdir -p deploy/admin/.next
          mkdir -p deploy/backend

          # Copy server.js and package.json
          cp server.js deploy/
          cp package.json deploy/

          # Website standalone
          cp -r website/.next/standalone deploy/website/.next/

          # Admin standalone
          cp -r admin/.next/standalone deploy/admin/.next/

          # Backend
          cp -r backend/dist deploy/backend/
          cp backend/package.json deploy/backend/
          cp backend/package-lock.json deploy/backend/

      # Deploy via SSH - upload first, then swap
      - name: Upload files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 147.93.42.43
          username: u966025995
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          source: "deploy/*"
          target: ~/domains/fooddeliveryaudit.com/deploy-new/
          strip_components: 1

      - name: Swap and restart
        uses: appleboy/ssh-action@v1
        with:
          host: 147.93.42.43
          username: u966025995
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          script: |
            export PATH=/opt/alt/alt-nodejs22/root/usr/bin:$PATH
            DEST=~/domains/fooddeliveryaudit.com/nodejs
            NEW=~/domains/fooddeliveryaudit.com/deploy-new

            # Save .env
            cp $DEST/backend/.env /tmp/backend-env-backup 2>/dev/null || true

            # Replace files (not delete first - safer)
            rm -rf $DEST/website $DEST/admin $DEST/backend
            mv $NEW/website $DEST/website
            mv $NEW/admin $DEST/admin
            mv $NEW/backend $DEST/backend
            cp $NEW/server.js $DEST/server.js
            cp $NEW/package.json $DEST/package.json

            # Install backend dependencies
            cd $DEST/backend
            npm install --production

            # Restore .env
            cp /tmp/backend-env-backup $DEST/backend/.env 2>/dev/null || true

            # Cleanup
            rm -rf $NEW

            # Restart Passenger
            touch $DEST/tmp/restart.txt
            echo "Deployed successfully!"
