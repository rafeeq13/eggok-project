name: Deploy to Hostinger

on:
  push:
    branches: [production]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Build website
      - name: Build website
        run: |
          cd website
          npm ci
          NEXT_PUBLIC_API_URL=/api npx next build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      # Build admin
      - name: Build admin
        run: |
          cd admin
          npm ci
          NEXT_PUBLIC_API_URL=/api npx next build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      # Build backend
      - name: Build backend
        run: |
          cd backend
          npm ci
          npx nest build

      # Prepare deployment package
      - name: Prepare package
        run: |
          mkdir -p deploy/website/.next
          mkdir -p deploy/admin/.next
          mkdir -p deploy/backend

          # Copy server.js and package.json
          cp server.js deploy/
          cp package.json deploy/

          # Website standalone
          cp -r website/.next/standalone deploy/website/.next/

          # Admin standalone
          cp -r admin/.next/standalone deploy/admin/.next/

          # Backend
          cp -r backend/dist deploy/backend/
          cp backend/package.json deploy/backend/
          cp backend/package-lock.json deploy/backend/

      # Deploy via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 147.93.42.43
          username: u966025995
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          script: |
            export PATH=/opt/alt/alt-nodejs22/root/usr/bin:$PATH
            DEST=~/domains/fooddeliveryaudit.com/nodejs

            # Save .env
            cp $DEST/backend/.env /tmp/backend-env-backup 2>/dev/null || true

            # Clean and prepare
            rm -rf $DEST/website $DEST/admin $DEST/backend
            rm -f $DEST/server.js $DEST/package.json

      - name: Upload files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 147.93.42.43
          username: u966025995
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          source: "deploy/*"
          target: ~/domains/fooddeliveryaudit.com/nodejs/
          strip_components: 1

      - name: Post-deploy setup
        uses: appleboy/ssh-action@v1
        with:
          host: 147.93.42.43
          username: u966025995
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          script: |
            export PATH=/opt/alt/alt-nodejs22/root/usr/bin:$PATH
            DEST=~/domains/fooddeliveryaudit.com/nodejs

            # Install backend dependencies
            cd $DEST/backend
            npm install --production

            # Restore .env
            cp /tmp/backend-env-backup $DEST/backend/.env 2>/dev/null || true

            # Restart Passenger
            touch $DEST/tmp/restart.txt
            echo "Deployed successfully!"
